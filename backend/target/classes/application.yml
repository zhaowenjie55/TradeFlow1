spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: tradeflow-arbitrage-backend
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL must be set (see backend/.env.example)}
    username: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME must be set}
    password: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}

management:
  health:
    redis:
      enabled: false

logging:
  pattern:
    level: "%5p [%X{traceId:-no-trace}]"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  web:
    cors:
      # Accept local Nuxt/Vite dev servers on any common localhost port.
      allowed-origin-patterns: ${APP_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  task:
    phase1-candidate-limit: 20
    processing-delay-millis: 250
    phase1-workflow-timeout-millis: ${PHASE1_WORKFLOW_TIMEOUT_MILLIS:60000}
    default-mode: AUTO_FALLBACK
  integration:
    llm:
      enabled: ${LLM_GATEWAY_ENABLED:true}
      force-simulated: ${LLM_FORCE_SIMULATED:false}
      endpoint-base: ${LLM_ENDPOINT_BASE:http://127.0.0.1:8001/api/llm}
      connect-timeout-millis: ${LLM_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${LLM_READ_TIMEOUT_MILLIS:60000}
      chat-endpoint: ${LLM_CHAT_ENDPOINT:https://open.bigmodel.cn/api/paas/v4/chat/completions}
      model: ${LLM_MODEL:glm-5}
      api-key: ${LLM_API_KEY:}
      temperature: ${LLM_TEMPERATURE:0.2}
    crawler:
      # Override this when the local FastAPI crawler runs on a different host or port.
      enabled: ${CRAWLER_SERVICE_ENABLED:true}
      cache-enabled: ${CRAWLER_CACHE_ENABLED:false}
      search-endpoint: ${CRAWLER_SEARCH_ENDPOINT:http://127.0.0.1:8001/api/search}
      detail-endpoint: ${CRAWLER_DETAIL_ENDPOINT:http://127.0.0.1:8001/api/detail}
      connect-timeout-millis: ${CRAWLER_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${CRAWLER_READ_TIMEOUT_MILLIS:30000}
      max-retries: ${CRAWLER_MAX_RETRIES:2}
      retry-initial-backoff-millis: ${CRAWLER_RETRY_INITIAL_BACKOFF_MILLIS:1000}
    asr:
      enabled: ${ASR_ENABLED:true}
      endpoint: ${ASR_ENDPOINT:http://127.0.0.1:8001/api/asr/transcribe}
      connect-timeout-millis: ${ASR_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${ASR_READ_TIMEOUT_MILLIS:600000}
      max-file-size-mb: ${ASR_MAX_FILE_SIZE_MB:100}
    domestic:
      enabled: ${DOMESTIC_GATEWAY_ENABLED:false}
      force-fallback: ${DOMESTIC_FORCE_FALLBACK:true}
      search-endpoint: ${DOMESTIC_SEARCH_ENDPOINT:http://127.0.0.1:8001/api/domestic/search}
      detail-endpoint: ${DOMESTIC_DETAIL_ENDPOINT:http://127.0.0.1:8001/api/domestic/detail}
      api-key: ${DOMESTIC_API_KEY:}
      connect-timeout-millis: ${DOMESTIC_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${DOMESTIC_READ_TIMEOUT_MILLIS:300000}
      max-retries: ${DOMESTIC_MAX_RETRIES:2}
      retry-initial-backoff-millis: ${DOMESTIC_RETRY_INITIAL_BACKOFF_MILLIS:1500}
    overseas:
      enabled: ${OVERSEAS_GATEWAY_ENABLED:false}
      force-fallback: ${OVERSEAS_FORCE_FALLBACK:true}
      search-endpoint: ${OVERSEAS_SEARCH_ENDPOINT:}
      api-key: ${OVERSEAS_API_KEY:}
      connect-timeout-millis: ${OVERSEAS_CONNECT_TIMEOUT_MILLIS:5000}
      read-timeout-millis: ${OVERSEAS_READ_TIMEOUT_MILLIS:30000}
      max-retries: ${OVERSEAS_MAX_RETRIES:2}
      retry-initial-backoff-millis: ${OVERSEAS_RETRY_INITIAL_BACKOFF_MILLIS:1000}
  pricing:
    usd-to-cny-rate: ${USD_TO_CNY_RATE:7.20}
    cross-border-logistics-rate: ${CROSS_BORDER_LOGISTICS_RATE:0.12}
    platform-fee-rate: ${PLATFORM_FEE_RATE:0.15}
    exchange-loss-rate: ${EXCHANGE_LOSS_RATE:0.03}
    fallback-sourcing-rate: ${FALLBACK_SOURCING_RATE:0.45}
    default-domestic-shipping-cost: ${DEFAULT_DOMESTIC_SHIPPING_COST:6.00}
  vector:
    enabled: ${VECTOR_ENABLED:true}
    provider: ${VECTOR_PROVIDER:local-bge-m3}
    model-path: ${VECTOR_MODEL_PATH:}
    tokenizer-path: ${VECTOR_TOKENIZER_PATH:}
    pooling-mode: ${VECTOR_POOLING_MODE:CLS}
    bootstrap-on-startup: ${VECTOR_BOOTSTRAP_ON_STARTUP:true}
    domestic-platform: ${VECTOR_DOMESTIC_PLATFORM:TAOBAO}
    fixed-keyword: ${VECTOR_FIXED_KEYWORD:}
    max-results: ${VECTOR_MAX_RESULTS:12}
    min-score: ${VECTOR_MIN_SCORE:0.55}
    dimension: ${VECTOR_DIMENSION:1024}
