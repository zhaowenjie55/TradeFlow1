spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: tradeflow-arbitrage-backend
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://47.103.117.192:5432/tradeflow
    username: postgres
    password: admin123456

    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  web:
    cors:
      # Accept local Nuxt/Vite dev servers on any common localhost port.
      allowed-origin-patterns: ${APP_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  task:
    phase1-candidate-limit: 20
    processing-delay-millis: 250
    default-mode: AUTO_FALLBACK
  integration:
    llm:
      enabled: ${LLM_GATEWAY_ENABLED:true}
      force-simulated: ${LLM_FORCE_SIMULATED:false}
      chat-endpoint: ${LLM_CHAT_ENDPOINT:https://open.bigmodel.cn/api/paas/v4/chat/completions}
      model: ${LLM_MODEL:glm-5}
      api-key: ${LLM_API_KEY:}
      temperature: ${LLM_TEMPERATURE:0.2}
    crawler:
      # Override this when the local FastAPI crawler runs on a different host or port.
      enabled: ${CRAWLER_SERVICE_ENABLED:true}
      search-endpoint: ${CRAWLER_SEARCH_ENDPOINT:http://127.0.0.1:8001/api/search}
      detail-endpoint: ${CRAWLER_DETAIL_ENDPOINT:http://127.0.0.1:8001/api/detail}
    domestic:
      enabled: ${DOMESTIC_GATEWAY_ENABLED:false}
      force-fallback: ${DOMESTIC_FORCE_FALLBACK:true}
      search-endpoint: ${DOMESTIC_SEARCH_ENDPOINT:http://127.0.0.1:8001/api/domestic/search}
      detail-endpoint: ${DOMESTIC_DETAIL_ENDPOINT:http://127.0.0.1:8001/api/domestic/detail}
      api-key: ${DOMESTIC_API_KEY:}
    overseas:
      enabled: ${OVERSEAS_GATEWAY_ENABLED:false}
      force-fallback: ${OVERSEAS_FORCE_FALLBACK:true}
      search-endpoint: ${OVERSEAS_SEARCH_ENDPOINT:}
      api-key: ${OVERSEAS_API_KEY:}
  pricing:
    usd-to-cny-rate: ${USD_TO_CNY_RATE:7.20}
    cross-border-logistics-rate: ${CROSS_BORDER_LOGISTICS_RATE:0.12}
    platform-fee-rate: ${PLATFORM_FEE_RATE:0.15}
    exchange-loss-rate: ${EXCHANGE_LOSS_RATE:0.03}
    fallback-sourcing-rate: ${FALLBACK_SOURCING_RATE:0.45}
    default-domestic-shipping-cost: ${DEFAULT_DOMESTIC_SHIPPING_COST:6.00}
  vector:
    enabled: ${VECTOR_ENABLED:true}
    provider: ${VECTOR_PROVIDER:local-bge-m3}
    model-path: ${VECTOR_MODEL_PATH:}
    tokenizer-path: ${VECTOR_TOKENIZER_PATH:}
    pooling-mode: ${VECTOR_POOLING_MODE:CLS}
    bootstrap-on-startup: ${VECTOR_BOOTSTRAP_ON_STARTUP:true}
    domestic-platform: ${VECTOR_DOMESTIC_PLATFORM:TAOBAO}
    fixed-keyword: ${VECTOR_FIXED_KEYWORD:亚克力透明收纳架}
    max-results: ${VECTOR_MAX_RESULTS:12}
    min-score: ${VECTOR_MIN_SCORE:0.55}
    dimension: ${VECTOR_DIMENSION:1024}
